<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0a0a0f"/>
  <!-- Gradient background orbs -->
  <circle cx="200" cy="315" r="300" fill="#9c1e99" opacity="0.15"/>
  <circle cx="1000" cy="315" r="250" fill="#25d366" opacity="0.1"/>
  <!-- Shield icon -->
  <g transform="translate(540, 140)">
    <path d="M60 10 L110 30 V70 C110 110 85 145 60 155 C35 145 10 110 10 70 V30 Z" fill="url(#shieldGrad)" opacity="0.9"/>
    <path d="M45 75 L55 85 L78 62" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Title -->
  <text x="600" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="52" font-weight="700" fill="white">
    <tspan fill="white" opacity="0.6" font-weight="400">Rox</tspan>Shield
  </text>
  <!-- Subtitle -->
  <text x="600" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="white" opacity="0.7">
    Human Security Training Platform
  </text>
  <!-- Features line -->
  <text x="600" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#25d366" opacity="0.9">
    Phishing Simulation • Formation • Risk Scoring • Gamification
  </text>
  <!-- Brand footer -->
  <text x="600" y="570" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="white" opacity="0.4">
    Par Rostel High-Tech — rostelhightech.com
  </text>
  <!-- Gradient def -->
  <defs>
    <linearGradient id="shieldGrad" x1="10" y1="10" x2="110" y2="155">
      <stop offset="0%" stop-color="#9c1e99"/>
      <stop offset="100%" stop-color="#25d366"/>
    </linearGradient>
  </defs>
</svg>
